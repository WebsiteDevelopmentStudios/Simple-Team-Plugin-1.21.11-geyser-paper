name: TeamPlugin
version: 1.0.0
main: com.teamplugin.TeamPlugin
api-version: "1.21"
description: A full-featured team system for Paper servers
author: TeamPlugin

commands:
  team:
    description: Team commands
    usage: /team <create|invite|settings|kick|chat|join|leave|info>
    aliases: [t]

permissions:
  teamplugin.admin:
    description: Access to admin team commands
    default: op
  teamplugin.player:
    description: Access to player team commands
    default: true
